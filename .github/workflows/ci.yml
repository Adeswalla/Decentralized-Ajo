name: CI/CD Pipeline

on:
  push:
    branches: [ main, fixed-branch ]
  pull_request:
    branches: [ main ]

jobs:
  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
      - name: Build and Test Contracts
        run: |
          cd contracts/ajo-circle
          cargo test --lib

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install Pnpm
        run: npm install -g pnpm
      - name: Install Dependencies
        run: pnpm install
      - name: Build
        run: pnpm run build
